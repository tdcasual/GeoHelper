name: Gateway Image Publish

on:
  workflow_run:
    workflows: ["CI Quality Gate"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: gateway-image-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image metadata
        id: vars
        env:
          OWNER: ${{ github.repository_owner }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          owner="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(printf '%s' "$SOURCE_SHA" | cut -c1-12)"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "image=ghcr.io/${owner}/geohelper-gateway" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "build_time=$build_time" >> "$GITHUB_OUTPUT"

      - name: Check out source revision
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.source_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: apps/gateway
          file: apps/gateway/Dockerfile
          build-contexts: |
            repo=.
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:staging
            ${{ steps.vars.outputs.image }}:sha-${{ steps.vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.vars.outputs.source_sha }}
          build-args: |
            GEOHELPER_BUILD_SHA=${{ steps.vars.outputs.short_sha }}
            GEOHELPER_BUILD_TIME=${{ steps.vars.outputs.build_time }}
