name: Deploy Gateway Staging

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/gateway/**"
      - "packages/protocol/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

jobs:
  build-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/geohelper-gateway:staging

      - name: Trigger staging deploy hook
        if: ${{ secrets.GATEWAY_STAGING_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -fsSL -X POST "$GATEWAY_STAGING_DEPLOY_HOOK_URL"
        env:
          GATEWAY_STAGING_DEPLOY_HOOK_URL: ${{ secrets.GATEWAY_STAGING_DEPLOY_HOOK_URL }}
