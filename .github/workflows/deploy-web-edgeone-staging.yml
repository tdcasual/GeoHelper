name: Deploy Web Staging (EdgeOne)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI Quality Gate"]
    types: [completed]

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      EDGEONE_PROJECT_NAME: ${{ secrets.EDGEONE_PROJECT_NAME }}
      EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
      EDGEONE_ENVIRONMENT: preview
      VITE_GATEWAY_URL: ${{ secrets.STAGING_GATEWAY_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy preview
        run: bash scripts/deploy/edgeone-deploy.sh
